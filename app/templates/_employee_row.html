<p>
    {{ employee.empl_name }} 
    <a href="/employees/{{ employee.id_employee }}">Details</a>
    <a href="/employees/{{ employee.id_employee }}/edit">Edit</a>
    <button
        type="button"
        hx-delete="/employees/{{ employee.id_employee }}"
        hx-confirm="Are you sure you want to delete this employee?"
        hx-target="closest p"
        hx-swap="outerHTML"
    >
        Delete
    </button>
    {% if error %}
    <span style="color: red;">{{ error }}</span>
    {% endif %}
</p>
