{% extends "base.html" %}
{% block content %}
<h1>Login</h1>
{% if error %}<p>{{ error }}</p>{% endif %}
<form method="post" action="/login">
    <input type="text" name="login" required>
    <input type="password" name="password" required>
    <button type="submit">Sign in</button>
</form>
{% endblock %}
