{% extends "base.html" %}
{% block title %}New store product{% endblock %}
{% block content %}
<h1>New store product</h1>
<form hx-post="/store_products/">
    <label>UPC <input type="text" name="upc" required maxlength="12"></label>
    <label>Product
        <select name="id_product" required>
            {% for p in products %}
            <option value="{{ p.id_product }}">{{ p.product_name }}</option>
            {% endfor %}
        </select>
    </label>
    <label>Price <input type="number" name="selling_price" required min="0" step="0.01"></label>
    <label>Quantity <input type="number" name="products_number" required min="0"></label>
    <button type="submit">Create</button>
    <a href="/store_products">Cancel</a>
</form>
{% endblock %}
