{% extends "base.html" %}
{% block title %}Employees{% endblock %}
{% block content %}
<h1>Employees</h1>

<a class="button-link" href="/employees/new">New employee</a>

<table class="data-table">
    <thead>
        <tr><th>ID</th><th>Surname</th><th>Name</th><th>Role</th><th></th></tr>
    </thead>
    <tbody>
        {% for employee in employees %}
        {% include "_employee_row.html" %}
        {% else %}
        <tr><td colspan="5">No employees.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
