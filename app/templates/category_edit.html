{% extends "base.html" %}
{% block content %}
<h1>Edit category</h1>
<form hx-put="/categories/{{ category.category_number }}">
    <input type="text" name="category_name" required minlength="1" maxlength="50" value="{{ category.category_name }}">
    <button type="submit">Save</button>
</form>
{% endblock %}
