{% extends "base.html" %}
{% block title %}Product sold{% endblock %}
{% block content %}
<h1>Quantity of a product sold for a period</h1>

<form class="toolbar" hx-get="/checks/reports/product" hx-target="#results" hx-select="#results" hx-swap="outerHTML" hx-push-url="true">
    <label>Product
        <select name="id_product" onchange="this.form.querySelector('button[type=submit]').disabled = !this.value">
            <option value="">— select —</option>
            {% for p in products %}
            <option value="{{ p.id_product }}" {% if p.id_product == id_product %}selected{% endif %}>
                {{ p.product_name }}
            </option>
            {% endfor %}
        </select>
    </label>
    <label>From <input type="date" name="date_from" value="{{ date_from or '' }}"></label>
    <label>To <input type="date" name="date_to" value="{{ date_to or '' }}"></label>
    <button type="submit" {% if id_product is none %}disabled{% endif %}>Show</button>
</form>

<div id="results">
    {% if qty is not none %}
    <p class="check-totals"><strong>Sold: {{ qty }} units</strong></p>
    <a class="button-link" href="/checks/reports/product/print?id_product={{ id_product }}&date_from={{ date_from or '' }}&date_to={{ date_to or '' }}">Print</a>
    {% else %}
    <p>Select a product to see how many were sold.</p>
    {% endif %}
</div>
{% endblock %}
