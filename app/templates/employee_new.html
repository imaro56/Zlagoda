{% extends "base.html" %}
{% block title %}New employee{% endblock %}
{% block content %}
<h1>New employee</h1>
<form hx-post="/employees/">
    <label>ID <input type="text" name="id_employee" required maxlength="10"></label>
    <label>Surname <input type="text" name="empl_surname" required maxlength="50"></label>
    <label>Name <input type="text" name="empl_name" required maxlength="50"></label>
    <label>Patronymic <input type="text" name="empl_patronymic" maxlength="50"></label>
    <label>Role
        <select name="empl_role" required>
            <option value="cashier">Cashier</option>
            <option value="manager">Manager</option>
        </select>
    </label>
    <label>Salary <input type="number" name="salary" required min="0" step="0.01"></label>
    <label>Date of birth <input type="date" name="date_of_birth" required></label>
    <label>Date of start <input type="date" name="date_of_start" required></label>
    <label>Phone <input type="text" name="phone_number" required maxlength="13"></label>
    <label>City <input type="text" name="city" required maxlength="50"></label>
    <label>Street <input type="text" name="street" required maxlength="50"></label>
    <label>ZIP <input type="text" name="zip_code" required maxlength="9"></label>
    <label>Login <input type="text" name="login" required></label>
    <label>Password <input type="password" name="password" required minlength="8"></label>
    <button type="submit">Create</button>
    <a href="/employees">Cancel</a>
</form>
{% endblock %}
