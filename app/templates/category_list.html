{% extends "base.html" %}
{% block title %}Categories{% endblock %}
{% block content %}
<h1>Categories</h1>

{% if user.empl_role == 'manager' %}
<a class="button-link" href="/categories/new">New category</a>
<a class="button-link" href="/categories/print">Print</a>
{% endif %}

<table class="data-table">
    <thead>
        <tr><th>№</th><th>Name</th><th></th></tr>
    </thead>
    <tbody>
        {% for category in categories %}
        {% include "_category_row.html" %}
        {% else %}
        <tr><td colspan="3">No categories.</td></tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
